services:
  ms-auth:
    build:
      context: ./ms-auth/ms-auth
    container_name: innovatech-ms-auth
    ports:
      - "8083:8083"

  ms-proyectos:
    build:
      context: ./ms-proyectos/ms-proyectos
    container_name: innovatech-ms-proyectos
    ports:
      - "8081:8081"

  ms-recursos:
    build:
      context: ./ms-recursos/ms-recursos
    container_name: innovatech-ms-recursos
    ports:
      - "8082:8082"

  ms-tareas:
    build:
      context: ./ms-tareas
    container_name: innovatech-ms-tareas
    ports:
      - "8086:8086"

  bff:
    build:
      context: ./bff/bff
    container_name: innovatech-bff
    depends_on:
      - ms-proyectos
      - ms-recursos
      - ms-tareas
    environment:
      # Dentro de Docker no se usa localhost entre contenedores.
      # Se usan los nombres de servicio definidos en este docker-compose.
      SPRING_APPLICATION_JSON: >
        {
          "ms.proyectos.url": "http://ms-proyectos:8081/api/proyectos",
          "ms.recursos.url": "http://ms-recursos:8082/api/recursos",
          "ms.tareas.url": "http://ms-tareas:8086/api/tareas"
        }
    ports:
      - "8084:8084"

  api-gateway:
    build:
      context: ./api-gateway
    container_name: innovatech-api-gateway
    depends_on:
      - ms-auth
      - ms-proyectos
      - ms-recursos
      - ms-tareas
      - bff
    environment:
      # Dentro de Docker se usa una configuracion completa de rutas.
      # Esto evita que las variables de entorno reemplacen solo la URI y borren los predicados Path.
      SPRING_APPLICATION_JSON: >
        {
          "spring.cloud.gateway.server.webmvc.routes": [
            {
              "id": "ms-auth",
              "uri": "http://ms-auth:8083",
              "predicates": [
                { "name": "Path", "args": { "_genkey_0": "/api/auth/**" } }
              ]
            },
            {
              "id": "ms-proyectos",
              "uri": "http://ms-proyectos:8081",
              "predicates": [
                { "name": "Path", "args": { "_genkey_0": "/api/proyectos/**" } }
              ]
            },
            {
              "id": "ms-recursos",
              "uri": "http://ms-recursos:8082",
              "predicates": [
                { "name": "Path", "args": { "_genkey_0": "/api/recursos/**" } }
              ]
            },
            {
              "id": "bff",
              "uri": "http://bff:8084",
              "predicates": [
                { "name": "Path", "args": { "_genkey_0": "/api/bff/**" } }
              ]
            },
            {
              "id": "ms-tareas",
              "uri": "http://ms-tareas:8086",
              "predicates": [
                { "name": "Path", "args": { "_genkey_0": "/api/tareas/**" } }
              ]
            }
          ]
        }
    ports:
      - "8085:8085"

  frontend:
    build:
      context: ../innovatech-frontend-mercado-bello/innovatech-frontend
    container_name: innovatech-frontend
    depends_on:
      - bff
      - ms-auth
    ports:
      - "3000:80"
