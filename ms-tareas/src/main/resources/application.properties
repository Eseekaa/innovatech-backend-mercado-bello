# Nombre del microservicio de tareas
spring.application.name=ms-tareas

# Puerto 8086 para no chocar con auth, proyectos, recursos, bff ni gateway
server.port=8086

# Base de datos H2 en memoria para tareas
spring.datasource.url=jdbc:h2:mem:tareasdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Hibernate crea las tablas automaticamente al iniciar
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# Consola H2 disponible en http://localhost:8086/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Necesario para abrir H2 desde el navegador cuando corre en Docker
spring.h2.console.settings.web-allow-others=true
